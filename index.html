<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="all-container">
    <div class="editor"> 

      <div class="filter">
        <label for="brightness">Brightness</label>
        <input type="range" max="200" min="0" value="100"  id="brightness" >
      </div>

      <div class="filter">
        <label for="contrast">Contrast</label>
        <input type="range" max="200" min="0" value="100"  id="contrast" >
      </div>

      <div class="filter">
        <label for="blur">Blur</label>
        <input type="range" max="7" min="0" value="0" step="0.1" id="blur" >
      </div>

      <div class="filter">
        <label for="sepia">Sepia</label>
        <input type="range" max="100" min="0" value="0"  id="sepia" >
      </div>

      <div class="filter">
        <label for="hue">Hue</label>
        <input type="range" max="360" min="0" value="0"  id="hue" >
      </div>

      <div class="filter">
        <label for="saturation">Saturation</label>
        <input type="range" max="200" min="0" value="0"  id="saturation" >
      </div>

      <div class="flip-button">

        <div class="flip-options">
          <input type="radio" name="flip" id="no-flip" checked>
          <label for="no-flip">No Flip</label>
        </div>

        <div class="flip-options">
          <input type="radio" name="flip" id="flip-y">
          <label for="flip-y">Vertical Flip</label>
        </div>

        <div class="flip-options">
          <input type="radio" name="flip" id="flip-x" >
          <label for="flip-x">Horizontal Flip</label>
        </div>

      </div>

    </div>

    <div class="result">
      <figure class="image-container">
        <img id="img-chosen">
      </figure>
      <input type="file" id="upload-button" accept="Image/*">
      <label for="upload-button">Select an Image</label>
    </div>
    
  </div>

  <script src="script.js"></script>
</body>
</html>
